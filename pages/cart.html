<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giỏ hàng | TechSphere</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-p1CmV9c4jFZPMcN+rVFHx+EpRm2Ahk5xWd+JQ8UGdvKp0JnMddN5NafU6SNIkWzETZXnAq1Jdw4gGVqzU4JefQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Giỏ hàng của bạn</h1>
      <p>Quản lý sản phẩm, số lượng và xem tổng thanh toán tại đây.</p>
      <div id="cartList" class="cart-list"></div>
      <div id="cartEmpty" class="empty-state hidden">
        <h2>Giỏ hàng trống</h2>
        <p>Thêm sản phẩm vào giỏ hàng để bắt đầu mua sắm.</p>
      </div>
      <div class="cart-summary">
        <span>Tổng cộng</span>
        <strong id="cartTotal">0 VNĐ</strong>
      </div>
      <button id="checkoutButton" class="primary">Tiến hành thanh toán</button>
      <div class="auth-footer">
        <p><a href="home.html">Tiếp tục mua sắm</a></p>
      </div>
    </section>
  </main>
  <script type="module" src="../js/cart.js"></script>
</body>
</html>
