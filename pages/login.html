<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập | TechSphere</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-p1CmV9c4jFZPMcN+rVFHx+EpRm2Ahk5xWd+JQ8UGdvKp0JnMddN5NafU6SNIkWzETZXnAq1Jdw4gGVqzU4JefQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Chào mừng trở lại</h1>
      <p>Đăng nhập để tiếp tục xem sản phẩm, thêm vào giỏ hàng và quản lý đơn hàng.</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" class="form-control" type="email" placeholder="email@domain.com" required>
        </div>
        <div class="form-group toggle-password">
          <label for="loginPassword">Mật khẩu</label>
          <input id="loginPassword" class="form-control" type="password" placeholder="********" required>
          <button type="button" id="toggleLoginPassword">Hiện</button>
        </div>
        <button type="submit" class="primary">Đăng nhập</button>
      </form>
      <div class="auth-footer">
        <p>Bạn chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
      </div>
    </section>
  </main>
  <script type="module" src="../js/login.js"></script>
</body>
</html>
